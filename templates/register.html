<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Fraud Detection</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body style="background: white;">

    <div class="auth-wrapper auth-reverse">
        <!-- Left Side: Visuals (Swapped to Left) -->
        <div class="auth-visual-side">
            <div class="mini-card mini-card-1">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <span style="font-size: 0.8rem; font-weight: 600; color: #64748b;">Global Security</span>
                    <i class="fas fa-globe-americas" style="color: #10b981;"></i>
                </div>
                <div style="font-size: 1.2rem; font-weight: 800; color: #1e293b; margin-bottom: 10px;">99.8% Accuracy</div>
                <div style="height: 8px; background: #e2e8f0; width: 100%; border-radius: 4px; overflow: hidden;">
                     <div style="width: 90%; height: 100%; background: #10b981; border-radius: 4px;"></div>
                </div>
            </div>

            <div class="mini-card mini-card-2" style="width: 300px;">
                <div style="background: rgba(16, 185, 129, 0.1); width: 44px; height: 44px; border-radius: 12px; display: flex; justify-content: center; align-items: center; margin-bottom: 15px;">
                    <i class="fas fa-user-shield" style="color: #10b981; font-size: 1.2rem;"></i>
                </div>
                <div style="font-family: 'Outfit'; font-weight: 700; font-size: 1.1rem; color: #1e293b; margin-bottom: 8px;">Protective Intelligence</div>
                <p style="font-size: 0.85rem; color: #64748b; line-height: 1.5;">Join thousands of institutions using our supervised ML to combat financial cyber-crime in real-time.</p>
            </div>
        </div>

        <!-- Right Side: Form -->
        <div class="auth-form-side" style="animation: slideInRight 0.6s ease-out;">
            <div style="width: 100%; max-width: 400px; position: absolute; top: 40px; display: flex; justify-content: space-between; align-items: center; padding: 0 40px;">
                <a href="/login" style="color: #10b981; font-weight: 600; text-decoration: none;">Sign in</a>
                <a href="/" style="color: var(--text-main); text-decoration: none;"><i class="fas fa-times"></i></a>
            </div>

            <div class="auth-form-container">
                <h2>Join Us</h2>
                <p class="subtitle" style="margin-bottom: 30px; text-align: left;">Create your secure account to get started.</p>

                <form method="POST" id="regForm">
                    <div class="input-group">
                        <label style="font-size: 0.85rem; font-weight: 600; margin-bottom: 5px; display: block;">Username</label>
                        <input type="text" name="username" placeholder="Choose a identifier" required style="background: #f8fafc; border-color: #e2e8f0; height: 45px;">
                    </div>
                    <div class="input-group">
                        <label style="font-size: 0.85rem; font-weight: 600; margin-bottom: 5px; display: block;">Email Address</label>
                        <input type="email" name="email" placeholder="name@company.com" required style="background: #f8fafc; border-color: #e2e8f0; height: 45px;">
                    </div>
                    <div class="input-group">
                        <label style="font-size: 0.85rem; font-weight: 600; margin-bottom: 5px; display: block;">Password</label>
                        <input type="password" name="password" id="password" placeholder="Create strong password" required style="background: #f8fafc; border-color: #e2e8f0; height: 45px;">
                        <div class="strength-meter" id="strengthMeter">
                            <div class="strength-bar bar-1"></div>
                            <div class="strength-bar bar-2"></div>
                            <div class="strength-bar bar-3"></div>
                        </div>
                        <span id="strengthText" class="strength-text" style="color: #94a3b8;">Strength: Enter password</span>
                    </div>
                    <div class="input-group">
                        <label style="font-size: 0.85rem; font-weight: 600; margin-bottom: 5px; display: block;">Confirm Password</label>
                        <input type="password" name="confirm_password" placeholder="Repeat your password" required style="background: #f8fafc; border-color: #e2e8f0; height: 45px;">
                    </div>
                    
                    <button type="submit" class="btn btn-success" style="width: 100%; border-radius: 12px; height: 50px; margin-top: 10px;">
                        Create Account
                    </button>
                    
                    <div class="social-login" style="margin-top: 20px;">
                        <div class="social-btn" style="height: 45px;"><i class="fab fa-google"></i></div>
                        <div class="social-btn" style="height: 45px;"><i class="fab fa-apple"></i></div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const password = document.getElementById('password');
        const meter = document.getElementById('strengthMeter');
        const text = document.getElementById('strengthText');

        password.addEventListener('input', () => {
            const val = password.value;
            let score = 0;
            if (val.length > 5) score++;
            if (val.length > 8 && /[A-Z]/.test(val) && /[0-9]/.test(val)) score++;
            if (/[!@#$%^&*]/.test(val)) score++;

            meter.className = 'strength-meter';
            if (score === 0) {
                text.innerText = 'Strength: Too short';
                text.style.color = '#94a3b8';
            } else if (score === 1) {
                meter.classList.add('strength-weak');
                text.innerText = 'Strength: Weak';
                text.style.color = '#dc2626';
            } else if (score === 2) {
                meter.classList.add('strength-medium');
                text.innerText = 'Strength: Medium';
                text.style.color = '#f59e0b';
            } else if (score === 3) {
                meter.classList.add('strength-strong');
                text.innerText = 'Strength: Strong';
                text.style.color = '#059669';
            }
        });
    </script>

    <style>
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(40px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>

</body>
</html>
